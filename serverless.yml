service: ats-integration-service

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.10
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 15
  environment:
    ATS_API_KEY: ${env:ATS_API_KEY}
    ATS_BASE_URL: ${env:ATS_BASE_URL}

plugins:
  - serverless-offline
  - serverless-python-requirements

custom:
  serverless-offline:
    httpPort: 3000
    host: 0.0.0.0
    noPrependStageInUrl: true
  pythonRequirements:
    dockerizePip: non-linux

package:
  patterns:
    - "!node_modules/**"
    - "!.venv/**"
    - "!venv/**"
    - "!__pycache__/**"
    - "!.env"
    - "!tests/**"

functions:
  getJobs:
    handler: handler.get_jobs
    description: "Fetch all open jobs from the ATS"
    events:
      - httpApi:
          path: /jobs
          method: GET

  createCandidate:
    handler: handler.create_candidate
    description: "Create candidate and attach to job in ATS"
    events:
      - httpApi:
          path: /candidates
          method: POST

  getApplications:
    handler: handler.get_applications
    description: "Fetch all applications for a specific job from the ATS"
    events:
      - httpApi:
          path: /applications
          method: GET
